# Deploy via Coolify: New Resource -> Docker Compose
#
# WORKSPACE_PATH: host directory for all projects
# GITHUB_USER: default GitHub username for clone() shorthand

services:
  mcp-shell:
    build: .
    ports:
      - "8008:8008"
    volumes:
      - ${WORKSPACE_PATH:-/opt/mcp-workspace}:/workspace:rw
    environment:
      - WORKSPACE=/workspace
      - GITHUB_USER=${GITHUB_USER:-OlegKarenkikh}
      - CMD_TIMEOUT=120
      - MAX_OUTPUT=4000
      - MAX_FILE_READ=8000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8008/sse').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
