# Deploy via Coolify: New Resource → Docker Compose → paste this
#
# Required: set PROJECT_PATH to the directory you want to expose
# The MCP server will only allow access within this directory.

services:
  mcp-shell:
    build: .
    ports:
      - "8008:8008"
    volumes:
      - ${PROJECT_PATH:-/home/oleg/projects}:/workspace:rw
    environment:
      - PROJECT_DIR=/workspace
      - CMD_TIMEOUT=120
      - MAX_OUTPUT=4000
      - MAX_FILE_READ=8000
    restart: unless-stopped
    # Security: limit resources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8008/sse').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
