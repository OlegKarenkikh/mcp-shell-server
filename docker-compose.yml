# Deploy via Coolify: New Resource -> Docker Compose
#
# Coolify auto-generates SSL via Let's Encrypt for SERVICE_FQDN_MCP
# Basic Auth protects the endpoint via Traefik middleware

services:
  mcp-shell:
    build: .
    environment:
      - SERVICE_FQDN_MCP_8008=https://mcp.olegk.su
      - WORKSPACE=/workspace
      - GITHUB_USER=${GITHUB_USER:-OlegKarenkikh}
      - CMD_TIMEOUT=120
      - MAX_OUTPUT=4000
      - MAX_FILE_READ=8000
    volumes:
      - ${WORKSPACE_PATH:-/opt/mcp-workspace}:/workspace:rw
    labels:
      - "traefik.http.middlewares.mcp-auth.basicauth.users=${AUTH_CREDENTIALS}"
      - "traefik.http.routers.mcp-shell-https.middlewares=mcp-auth"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8008/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
