# Deploy via Coolify: New Resource -> Docker Compose
# SERVICE_FQDN_MCP tells Coolify to create Traefik routes + SSL

services:
  mcp-shell:
    build: .
    ports:
      - "8008:8008"
    environment:
      - SERVICE_FQDN_MCP_8008
      - WORKSPACE=/workspace
      - GITHUB_USER=${GITHUB_USER:-OlegKarenkikh}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - CMD_TIMEOUT=120
      - MAX_OUTPUT=4000
      - MAX_FILE_READ=8000
    volumes:
      - ${WORKSPACE_PATH:-/opt/mcp-workspace}:/workspace:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/healthz", "-o", "/dev/null", "--max-time", "2"]
      interval: 30s
      timeout: 10s
      retries: 3
